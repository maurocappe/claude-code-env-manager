name: team-env
description: "Shared team environment"
plugins:
  enable:
    - name: superpowers
      source: claude-plugins-official
      version: "^5.0.0"
  disable:
    - superpowers:brainstorming
mcp_servers:
  test-server:
    command: "echo"
    args: ["mock-mcp"]
settings:
  effortLevel: high
  permissions:
    allow:
      - "Bash(pytest *)"
